<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 40px 30px;
      border-radius: 10px;
      text-align: center;
      width: 320px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #e8503a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      margin-top: 6px;
      cursor: pointer;
    }

    p { color: #888; margin-top: 12px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🪁</h1>
    <h2>Login to Kite</h2>
    <input type="text" placeholder="Phone number or User ID" />
    <input type="password" placeholder="Password" />
    <button>Login</button>
    <p>Forgot user ID or password?</p>
  </div>
</body>
</html>
