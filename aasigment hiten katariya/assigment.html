<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Login</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<main class="page">
			<section class="card">
				<div class="logo" aria-hidden="true"></div>
				<h1>Login to Kite</h1>

				<div class="field">
					<label for="user">Phone number or User ID</label>
					<input id="user" type="text" placeholder="" />
				</div>

				<div class="field">
					<label for="password">Password</label>
					<div class="password-wrap">
						<input id="password" type="password" placeholder="" />
					</div>
				</div>

				<button class="btn" type="button">Login</button>
				<a class="link" href="#">Forgot user ID or password?</a>
			</section>

			<div class="brands" aria-hidden="true">
				<span class="brand-icon"></span>
				<span class="brand-icon circle"></span>
			</div>

			<div class="footer">Don't have an account? Sign up for free!</div>
			<div class="tiny">

v3.0.0
			</div>
		</main>
	</body>
</html>
